---
- name: Create EC2 Instances in Default VPC
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    instance_count: 2
    ami_id: ami-0a14f53a6fe4dfcd1
    instance_type: t3.micro
    region: ap-south-1
    key_name: ansible

  tasks:
    - name: Get default VPC
      amazon.aws.ec2_vpc_net_info:
        region: "{{ region }}"
        filters:
          isDefault: true
      register: default_vpc

    - name: Get subnet from default VPC
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ region }}"
        filters:
          vpc-id: "{{ default_vpc.vpcs[0].vpc_id }}"
      register: subnet_info

    - name: Launch EC2 Instances
      amazon.aws.ec2_instance:
        name: "Ansible-Server-{{ item }}"
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        region: "{{ region }}"
        subnet_id: "{{ subnet_info.subnets[0].subnet_id }}"
        wait: yes
      loop: "{{ range(1, instance_count + 1) | list }}"
      notify: EC2 Created

  handlers:
    - name: EC2 Created
      debug:
        msg: "EC2 instances created successfully in default VPC!"
